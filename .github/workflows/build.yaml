name: Build

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.md'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '*.md'

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check-format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run make format
        run: make format
      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Code is not formatted. Please run 'go fmt ./...' and commit the changes."
            git diff
            exit 1
          fi

  check-readme:
    name: Check README is up-to-date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Update README tools
        run: make update-readme-tools
      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet README.md docs/configuration.md; then
            echo "::error::README.md or docs/configuration.md is out of date. Please run 'make update-readme-tools' and commit the changes."
            git diff README.md docs/configuration.md
            exit 1
          fi

  build:
    needs: [check-format, check-readme]
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest #x64
          - ubuntu-24.04-arm #arm64
          - windows-latest #x64
          - macos-15-intel #x64
          - macos-latest #arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: make build
      - name: Test
        run: make test

  cross-compile:
    needs: [check-format, check-readme]
    name: Cross-compile for linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - s390x
          - ppc64le
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build
        run: make build-multiarch TARGETOS=linux TARGETARCH=${{ matrix.goarch }}
